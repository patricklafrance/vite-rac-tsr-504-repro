name: CI

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

env:
    CI: true

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    ci:
        runs-on: ubuntu-latest
        env:
            TURBO_TELEMETRY_DISABLED: "1"

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

              # PNPM setup based on https://github.com/pnpm/action-setup#use-cache-to-reduce-installation-time
            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  run_install: false

            - name: Install Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ">=24.0.0"
                  check-latest: true
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Secret scan
              uses: gitleaks/gitleaks-action@v2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GITLEAKS_CONFIG: .gitleaks.toml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Restore Turborepo cache
              id: cache-turborepo-restore
              uses: actions/cache/restore@v5
              with:
                  key: ${{ runner.os }}-turbo-ci-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-ci-
                      ${{ runner.os }}-turbo-
                  path: .turbo

            - name: Build web app
              # For a PR, only build the web app if it's diverging from the pull request original baseline.
              run: |
                  if [ "${{ github.event_name }}" == "pull_request" ]; then
                      pnpm turbo run build --filter=@apps/web...[${{ github.event.pull_request.base.sha }}]
                  else
                      pnpm build-web
                  fi

            # - name: Build storybook
            #   # For a PR, only build the Storybook if it's diverging from the pull request original baseline.
            #   run: |
            #       if [ "${{ github.event_name }}" == "pull_request" ]; then
            #           pnpm turbo run build --filter=@apps/storybook...[${{ github.event.pull_request.base.sha }}]
            #       else
            #           pnpm build-storybook
            #       fi

            - name: Oxfmt
              run: pnpm turbo run oxfmt

            - name: Oxlint
              run: pnpm turbo run oxlint

            - name: Typecheck
              # For a PR, only typecheck the projects that are diverging from the pull request original baseline.
              run: |
                  if [ "${{ github.event_name }}" == "pull_request" ]; then
                      pnpm turbo run typecheck --continue --filter=...[${{ github.event.pull_request.base.sha }}]
                  else
                      pnpm turbo run typecheck
                  fi

            - name: Syncpack
              run: pnpm turbo run syncpack

            - name: Save Turborepo cache
              id: cache-turborepo-save
              if: always() && steps.cache-turborepo-restore.outputs.cache-hit != 'true'
              uses: actions/cache/save@v5
              with:
                  key: ${{ steps.cache-turborepo-restore.outputs.cache-primary-key }}
                  path: .turbo
